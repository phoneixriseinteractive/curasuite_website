<!-- ═══════════════════════════════════════════════════════════════════════════
     Global "Book Demo / Appointment" Widget
     2-step modal: Step 1 product cards → Step 2 form → instant confirmation.
     Included once in base.html so it appears on every public page.
═══════════════════════════════════════════════════════════════════════════ -->
<div x-data="appointmentWidget()" x-cloak>

  <!-- Floating trigger button -->
  <button @click="open()" type="button"
    style="position:fixed;bottom:96px;right:90px;z-index:var(--z-modal);
           background:var(--color-primary-600);color:white;
           border:none;border-radius:var(--radius-full);
           padding:14px 22px;font-size:var(--text-sm);font-weight:var(--font-semi);
           display:flex;align-items:center;gap:8px;cursor:pointer;
           box-shadow:0 8px 24px rgba(37,99,235,.35);
           transition:transform .15s ease;"
    onmouseover="this.style.transform='translateY(-2px)'"
    onmouseout="this.style.transform='translateY(0)'">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    Book Demo / Appointment
  </button>

  <!-- Modal backdrop — separate fixed layer, click anywhere on it to close -->
  <div x-show="isOpen" x-transition.opacity x-cloak
       style="position:fixed;inset:0;background:rgba(17,24,39,.6);z-index:var(--z-modal);"
       @click="close()"></div>

  <!-- Modal card — centered via fixed + transform, independent of any parent layout context -->
  <div x-show="isOpen" x-transition x-cloak
       @click.stop
       style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
              background:white;border-radius:var(--radius-xl);
              width:calc(100% - 32px);max-width:560px;max-height:90vh;overflow-y:auto;
              box-shadow:var(--shadow-xl);z-index:calc(var(--z-modal) + 1);">

      <!-- Close button -->
      <button @click="close()" type="button"
        style="position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;border:none;background:var(--color-gray-100);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-secondary);z-index:1;">✕</button>

      <!-- STEP 1 — Product selection -->
      <div x-show="step === 1" style="padding:40px 32px 32px;">
        <h3 style="margin-bottom:6px;">Book a Free Demo</h3>
        <p style="color:var(--text-secondary);font-size:var(--text-sm);margin-bottom:24px;">Which product would you like to explore?</p>

        <div style="display:flex;flex-direction:column;gap:12px;">
          {% for product in ALL_PRODUCTS %}
          <button type="button" @click="selectProduct('{{ product.key }}', '{{ product.name }}')"
            style="display:flex;align-items:center;gap:16px;padding:18px;border:2px solid var(--border-default);border-radius:var(--radius-lg);background:white;cursor:pointer;text-align:left;transition:border-color .15s, background .15s;width:100%;"
            onmouseover="this.style.borderColor='{{ product.color }}';this.style.background='{{ product.color }}08';"
            onmouseout="this.style.borderColor='var(--border-default)';this.style.background='white';">
            {% if product.icon %}
            <img src="{{ product.icon.url }}" alt="{{ product.name }}" style="width:44px;height:44px;object-fit:contain;flex-shrink:0;">
            {% else %}
            <div style="width:44px;height:44px;background:{{ product.color }}15;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <span style="color:{{ product.color }};font-weight:800;font-size:18px;">{{ product.name|slice:":1" }}</span>
            </div>
            {% endif %}
            <div>
              <div style="font-size:var(--text-base);font-weight:var(--font-semi);color:var(--text-primary);">{{ product.name }}</div>
              <div style="font-size:var(--text-sm);color:var(--text-muted);">{{ product.tagline }}</div>
            </div>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" style="margin-left:auto;flex-shrink:0;"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
          {% endfor %}
        </div>
      </div>

      <!-- STEP 2 — Appointment form -->
      <div x-show="step === 2" style="padding:40px 32px 32px;">
        <button @click="step = 1" type="button" style="display:flex;align-items:center;gap:4px;border:none;background:none;color:var(--text-muted);font-size:var(--text-sm);cursor:pointer;margin-bottom:16px;padding:0;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </button>

        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
          <div :style="`width:32px;height:32px;background:${selectedColor}15;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;color:${selectedColor};font-size:14px;`" x-text="selectedProductName.charAt(0)"></div>
          <h3 style="margin:0;" x-text="`Book a Demo — ${selectedProductName}`"></h3>
        </div>
        <p style="color:var(--text-secondary);font-size:var(--text-sm);margin-bottom:20px;">Share your details and we'll confirm your appointment shortly.</p>

        <div id="appointment-form-wrap">
          <form hx-post="/contact/appointment/" hx-target="#appointment-form-wrap" hx-swap="innerHTML">
            {% csrf_token %}
            <input type="hidden" name="product" :value="selectedProduct">
            <input type="hidden" name="source"       :value="utmParams.source">
            <input type="hidden" name="utm_source"   :value="utmParams.utm_source">
            <input type="hidden" name="utm_medium"   :value="utmParams.utm_medium">
            <input type="hidden" name="utm_campaign" :value="utmParams.utm_campaign">
            <input type="hidden" name="utm_content"  :value="utmParams.utm_content">

            <div style="display:flex;flex-direction:column;gap:14px;">

              <div>
                <label style="font-size:var(--text-sm);font-weight:var(--font-medium);color:var(--text-secondary);display:block;margin-bottom:6px;">Full Name <span style="color:var(--color-error);">*</span></label>
                <input type="text" name="full_name" required placeholder="Dr. Anita Sharma"
                  style="width:100%;padding:11px 14px;border:1px solid var(--border-default);border-radius:var(--radius);font-size:var(--text-sm);font-family:inherit;">
              </div>

              <div class="form-row-2" style="gap:14px;">
                <div>
                  <label style="font-size:var(--text-sm);font-weight:var(--font-medium);color:var(--text-secondary);display:block;margin-bottom:6px;">Phone Number <span style="color:var(--color-error);">*</span></label>
                  <input type="tel" name="phone" required placeholder="98765 43210"
                    style="width:100%;padding:11px 14px;border:1px solid var(--border-default);border-radius:var(--radius);font-size:var(--text-sm);font-family:inherit;">
                </div>
                <div>
                  <label style="font-size:var(--text-sm);font-weight:var(--font-medium);color:var(--text-secondary);display:block;margin-bottom:6px;">Email <span style="font-weight:400;color:var(--text-muted);">(optional)</span></label>
                  <input type="email" name="email" placeholder="doctor@clinic.com"
                    style="width:100%;padding:11px 14px;border:1px solid var(--border-default);border-radius:var(--radius);font-size:var(--text-sm);font-family:inherit;">
                </div>
              </div>

              <div class="form-row-2" style="gap:14px;">
                <div>
                  <label style="font-size:var(--text-sm);font-weight:var(--font-medium);color:var(--text-secondary);display:block;margin-bottom:6px;">City <span style="color:var(--color-error);">*</span></label>
                  <input type="text" name="city" required placeholder="Dehradun"
                    style="width:100%;padding:11px 14px;border:1px solid var(--border-default);border-radius:var(--radius);font-size:var(--text-sm);font-family:inherit;">
                </div>
                <div>
                  <label style="font-size:var(--text-sm);font-weight:var(--font-medium);color:var(--text-secondary);display:block;margin-bottom:6px;">Clinic Name <span style="color:var(--color-error);">*</span></label>
                  <input type="text" name="organization" required placeholder="Sharma Clinic"
                    style="width:100%;padding:11px 14px;border:1px solid var(--border-default);border-radius:var(--radius);font-size:var(--text-sm);font-family:inherit;">
                </div>
              </div>

              <!-- Specialty — icon-based mandatory selector -->
              <div>
                <label style="font-size:var(--text-sm);font-weight:var(--font-medium);color:var(--text-secondary);display:block;margin-bottom:8px;">Specialty <span style="color:var(--color-error);">*</span></label>
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;" x-data="{ specialty: '' }">
                  <input type="hidden" name="specialty" :value="specialty">
                  <template x-for="opt in specialtyOptions" :key="opt.value">
                    <button type="button" @click="specialty = opt.value"
                      :style="specialty === opt.value
                        ? 'border-color:var(--color-primary-600);background:var(--color-primary-50);'
                        : 'border-color:var(--border-default);background:white;'"
                      style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 6px;border:2px solid var(--border-default);border-radius:var(--radius);cursor:pointer;transition:.15s;">
                      <span style="font-size:20px;" x-text="opt.icon"></span>
                      <span style="font-size:11px;font-weight:500;color:var(--text-secondary);text-align:center;line-height:1.2;" x-text="opt.label"></span>
                    </button>
                  </template>
                </div>
              </div>

            </div>

            {% include "components/captcha_field.html" %}

            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:20px;padding:13px;">
              Confirm Appointment →
            </button>
            <p style="font-size:11px;color:var(--text-muted);text-align:center;margin-top:10px;">
              By submitting, you agree to our <a href="/privacy-policy/">Privacy Policy</a>.
            </p>
          </form>
        </div>
      </div>

  </div>
</div>

<script>
function appointmentWidget() {
  return {
    isOpen: false,
    step: 1,
    selectedProduct: '',
    selectedProductName: '',
    selectedColor: '#2563EB',
    specialtyOptions: [
      { value: 'general_physician', label: 'General Physician', icon: '🩺' },
      { value: 'dentist',           label: 'Dentist',            icon: '🦷' },
      { value: 'physiotherapist',   label: 'Physiotherapist',    icon: '🏃' },
      { value: 'ophthalmologist',   label: 'Ophthalmologist',    icon: '👁️' },
      { value: 'pathology_lab',     label: 'Pathology Lab',      icon: '🔬' },
      { value: 'other',             label: 'Other',              icon: '➕' },
    ],
    utmParams: { source: '', utm_source: '', utm_medium: '', utm_campaign: '', utm_content: '' },

    init() {
      const params = new URLSearchParams(window.location.search);
      this.utmParams.utm_source   = params.get('utm_source')   || '';
      this.utmParams.utm_medium   = params.get('utm_medium')   || '';
      this.utmParams.utm_campaign = params.get('utm_campaign') || '';
      this.utmParams.utm_content  = params.get('utm_content')  || params.get('gclid') || params.get('fbclid') || '';
    },
    open() { this.isOpen = true; this.step = 1; document.body.style.overflow = 'hidden'; },
    close() { this.isOpen = false; document.body.style.overflow = ''; },
    selectProduct(key, name) {
      this.selectedProduct = name;  // store display name — matches Lead.product_interest convention
      this.selectedProductName = name;
      const colors = { 'CuraCMS': '#2563EB', 'CuraLabs': '#16A34A', 'CuraSuite': '#EA580C' };
      this.selectedColor = colors[name] || '#2563EB';
      this.step = 2;
    },
  };
}
</script>
